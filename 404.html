<body>

    <div class="page-loader" id="pageLoader">
        <div class="loader-content">
            <div class="loader-spinner"></div>
            <div class="loader-text">Loading</div>
        </div>
    </div>

    <div class="scroll-progress"></div>

    <nav>
        <div class="nav-content">
            <a href="/" class="nav-logo">Cynthia Niaz</a>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/resume">Resume</a>
                <a href="/projects">Projects</a>
                <a href="/notes">Notes</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="decoration"></div>
        <div class="error-content">
            <div class="error-code">404</div>
            <h1>Page Not Found</h1>
            <p>The page you're looking for doesn't exist or may have been moved. Let's get you back on track.</p>

            <div class="quote-404" id="quote404Wrapper">
                <div class="quote-404-item active">
                    <div class="quote-404-mark">"</div>
                    <p class="quote-404-text">The best way to solve a problem is to find a solution.</p>
                    <p class="quote-404-author">Greg Heffley</p>
                </div>
                <div class="quote-404-item">
                    <div class="quote-404-mark">"</div>
                    <p class="quote-404-text">What??? NOOOOOOOOOO!!! BOOOOOO</p>
                    <p class="quote-404-author">Mindy Kaling</p>
                </div>
            </div>

            <div class="buttons">
                <a href="/" class="btn">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M2 8L8 2L14 8M3 7V14H6V11H10V14H13V7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Go Home
                </a>
                <button onclick="history.back()" class="btn btn-secondary">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M8 2L2 8L8 14M2 8H14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Go Back
                </button>
            </div>
        </div>
    </div>

    <button class="dark-mode-toggle" id="darkModeToggle" aria-label="Toggle dark mode" title="Toggle dark mode"></button>
    <button class="back-to-top" id="backToTop" aria-label="Back to top">↑</button>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/dark-mode.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var wrapper = document.getElementById('quote404Wrapper');
            if (!wrapper) return;
            var items = wrapper.querySelectorAll('.quote-404-item');
            var current = 0;
            setInterval(function() {
                items[current].classList.remove('active');
                current = (current + 1) % items.length;
                items[current].classList.add('active');
            }, 4000);
        });
    </script>
